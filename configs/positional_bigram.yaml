experiment:
  name: positional_bigram
  seed: 42

runtime:
  device: auto

data:
  input_path: data/raw/tiny.txt
  val_frac: 0.1
  lowercase: true
  batch_size: 16
  block_size: 8

model:
  name: positional_bigram
  kwargs:
    block_size: 8
    emb_size: 32

train:
  max_steps: 10000
  eval_interval: 500
  eval_iters: 20
  optimizer: adamw
  learning_rate: 0.001
  weight_decay: 0.0
  scheduler: null

generation:
  prompts:
    - happy
    - model
    - nemar
  max_new_tokens: 200

outputs:
  checkpoint_dir: checkpoints
  run_dir: runs
