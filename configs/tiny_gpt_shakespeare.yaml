experiment:
  name: tiny_gpt_shakespeare
  seed: 42

runtime:
  device: auto

data:
  input_path: data/raw/tinyshakespeare.txt
  val_frac: 0.1
  lowercase: true
  batch_size: 64
  block_size: 64

model:
  name: tiny_gpt
  kwargs:
    block_size: 64
    emb_size: 64
    num_heads: 4
    num_layers: 2

train:
  criterion: lm_cross_entropy
  max_steps: 10000
  eval_interval: 500
  eval_iters: 20
  optimizer: adamw
  learning_rate: 0.001
  weight_decay: 0.0
  scheduler: null

generation:
  block_size: 64
  temperature: 0.8
  top_k: 40
  prompts:
    - "juliet"
    - "romeo"
    - "first"
  max_new_tokens: 300

outputs:
  checkpoint_dir: checkpoints
  run_dir: runs
