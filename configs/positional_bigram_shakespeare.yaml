experiment:
  name: positional_bigram_shakespeare
  seed: 42

runtime:
  device: auto

data:
  input_path: data/raw/tinyshakespeare.txt
  val_frac: 0.1
  lowercase: true
  batch_size: 32
  block_size: 8

model:
  name: positional_bigram
  kwargs:
    block_size: 8
    emb_size: 32

train:
  criterion: lm_cross_entropy
  max_steps: 10000
  eval_interval: 500
  eval_iters: 20
  optimizer: adamw
  learning_rate: 0.001
  weight_decay: 0.0
  scheduler: null

generation:
  block_size: 8
  temperature: 1.0
  top_k: null
  prompts:
    - "juliet"
    - "romeo"
    - "first"
  max_new_tokens: 300

outputs:
  checkpoint_dir: checkpoints
  run_dir: runs
